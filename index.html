<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decantcias | Perfumería Árabe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #8a6d3b; --dorado-claro: #bc9c22; --fondo: #fdfaf6; }
        body { font-family: 'Poppins', sans-serif; background: var(--fondo); margin: 0; padding-bottom: 120px; color: #333; }
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Playfair Display', serif; color: var(--dorado); font-size: 2.8rem; margin: 0; letter-spacing: 3px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; }
        .card img { width: 100%; height: 280px; object-fit: contain; border-radius: 15px; }
        .price { font-weight: 600; color: var(--dorado-claro); font-size: 1.2rem; }
        .modal-detail { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); overflow-y: auto; }
        .detail-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 550px; border-radius: 25px; position: relative; }
        .carousel { position: relative; width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; }
        .carousel img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.1); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); }
        .btn-buy { background: #25D366; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .close { position: absolute; right: 25px; top: 20px; font-size: 35px; cursor: pointer; color: #ccc; }
    </style>
</head>
<body>

<header>
    <h1>DECANTCIAS</h1>
    <p>Elegancia en cada gota</p>
</header>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<div id="productModal" class="modal-detail">
    <div class="detail-content">
        <span class="close" onclick="closeDetail()">&times;</span>
        <div class="carousel">
            <button class="nav-btn" style="left:10px" onclick="changeImg(-1)">&#10094;</button>
            <img id="modal-img" src="">
            <button class="nav-btn" style="right:10px" onclick="changeImg(1)">&#10095;</button>
        </div>
        <h2 id="modal-title" style="font-family: 'Playfair Display', serif;"></h2>
        <div id="modal-price" style="font-size: 1.6rem; color: var(--dorado-claro); font-weight: bold;"></div>
        <p id="modal-desc" style="color:#555; line-height:1.6;"></p>
        <button onclick="addToCartFromModal()" class="btn-buy" style="width: 100%; background: var(--dorado);">Añadir al carrito</button>
    </div>
</div>

<div class="cart-bar">
    <div style="font-size: 1.1rem;">Total: <strong id="cart-total">$0</strong></div>
    <a href="#" class="btn-buy" onclick="sendWhatsApp()">Pedir por WhatsApp</a>
</div>

<script>
    const products = [
        { 
            id: 1, 
            name: "Lattafa Asad", 
            price: 60000, 
            imgs: ["img/asad.jpg", "img/asad2.jpg", "img/asad3.jpg"],
            desc: "Lattafa Asad es una fragancia avainillada con notas picantes de pimienta y piña. Un aroma potente y masculino."
        },
        { 
            id: 2, 
            name: "Khamrah", 
            price: 65000, 
            imgs: ["img/khamrah.jpg"],
            desc: "Dulce y lujoso, con notas de canela, dátiles y praliné."
        }
    ];

    let cart = [];
    let currentProduct = null;
    let currentImgIdx = 0;

    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card" onclick="openDetail(${p.id})">
                <img src="${p.imgs[0]}" onerror="this.src='https://via.placeholder.com/300?text=Imagen+No+Encontrada'">
                <h3>${p.name}</h3>
                <div class="price">$${p.price.toLocaleString()}</div>
            </div>
        `;
    });

    function openDetail(id) {
        currentProduct = products.find(p => p.id === id);
        currentImgIdx = 0;
        document.getElementById('modal-title').innerText = currentProduct.name;
        document.getElementById('modal-price').innerText = `$${currentProduct.price.toLocaleString()}`;
        document.getElementById('modal-desc').innerText = currentProduct.desc;
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
        document.getElementById('productModal').style.display = 'block';
    }

    function changeImg(step) {
        currentImgIdx += step;
        if (currentImgIdx < 0) currentImgIdx = currentProduct.imgs.length - 1;
        if (currentImgIdx >= currentProduct.imgs.length) currentImgIdx = 0;
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
    }

    function closeDetail() { document.getElementById('productModal').style.display = 'none'; }

    function addToCartFromModal() {
        cart.push(currentProduct);
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        closeDetail();
    }

    function sendWhatsApp() {
        if(cart.length === 0) return alert("Carrito vacío");
        let msg = "✨ *Pedido Decantcias* ✨\n\n";
        cart.forEach(i => msg += `• ${i.name} ($${i.price.toLocaleString()})\n`);
        msg += `\n*Total: $${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}*`;
        window.open(`https://wa.me/5493517883411?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>

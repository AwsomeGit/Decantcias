<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decantcias | Perfumería Árabe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --dorado: #8a6d3b;
      --dorado-claro: #bc9c22;
      --fondo: #fdfaf6;
      --blanco: #ffffff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--fondo);
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Encabezado */
    header {
      background-color: var(--blanco);
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin: 0;
      color: var(--dorado);
      letter-spacing: 2px;
    }

    header p {
      font-style: italic;
      color: #666;
      margin-top: 5px;
    }

    /* Contenedor de Productos */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    /* Tarjeta de Producto */
    .card {
      background: var(--blanco);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      border: 1px solid #f0f0f0;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: var(--dorado-claro);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin: 10px 0;
    }

    .card .price {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--dorado-claro);
      margin-bottom: 20px;
    }

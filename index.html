<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decantcias | Perfumería Árabe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #8a6d3b; --dorado-claro: #bc9c22; --fondo: #fdfaf6; }
        body { font-family: 'Poppins', sans-serif; background: var(--fondo); margin: 0; padding-bottom: 140px; color: #333; }
        
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Playfair Display', serif; color: var(--dorado); font-size: 2.8rem; margin: 0; letter-spacing: 3px; }

        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; }
        .card img { width: 100%; height: 280px; object-fit: contain; border-radius: 15px; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { 
            background: white; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 40px 25px 25px; 
            width: 85%; 
            max-width: 450px; 
            border-radius: 25px; 
            text-align: center;
        }

        /* BOTÓN X CERRAR (FIX DEFINITIVO) */
        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            width: 40px; 
            height: 40px; 
            background: #f0f0f0; 
            color: #333;
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 20px;
            font-weight: bold;
            border: none;
            line-height: 1;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .close-btn:hover { background: #e0e0e0; }

        /* CARRUSEL Y CONTROLES */
        .carousel { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .carousel img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        .unidero { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 15px; }
        .btn-qty { background: var(--dorado); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        /* BARRA INFERIOR */
        .cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); 
            z-index: 1000; 
            border-radius: 25px 25px 0 0; 
        }

        .btn-main { background: var(--dorado); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 600; cursor: pointer; display: block; text-align: center; text-decoration: none; margin-top: 15px; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<header>
    <h1>DECANTCIAS</h1>
    <p>Elegancia en cada gota</p>
</header>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModals()">✕</button>
        <div class="carousel">
            <button class="nav-btn" onclick="changeImg(-1)">❮</button>
            <img id="modal-img" src="">
            <button class="nav-btn" onclick="changeImg(1)">❯</button>
        </div>
        <h2 id="modal-title" style="margin: 10px 0; font-family: 'Playfair Display', serif;"></h2>
        <div id="modal-price" style="font-size: 1.5rem; color: var(--dorado-claro); font-weight: bold;"></div>
        
        <div class="unidero">
            <button class="btn-qty" onclick="updateQty(-1)">-</button>
            <span id="prod-qty" style="font-weight: bold; font-size: 1.3rem; min-width: 30px;">1</span>
            <button class="btn-qty" onclick="updateQty(1)">+</button>
        </div>
        <button onclick="addToCart()" class="btn-main">Añadir al Carrito</button>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModals()">✕</button>
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 20px;">Tu Pedido</h2>
        <div id="cart-list" style="max-height: 250px; overflow-y: auto;"></div>
        <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; text-align: right;">
            Total: <strong id="modal-total" style="font-size: 1.4rem; color: var(--dorado);">$0</strong>
        </div>
        <a href="#" onclick="sendWhatsApp()" class="btn-whatsapp">Confirmar por WhatsApp</a>
    </div>
</div>

<div class="cart-bar" onclick="openCart()" style="cursor: pointer;">
    <div>
        <span style="font-size: 0.85rem; color: #888;">🛒 Ver pedido</span><br>
        <strong id="cart-count">0</strong> productos
    </div>
    <div style="text-align: right;">
        <span style="font-size: 0.85rem; color: #888;">Total</span><br>
        <strong id="cart-total" style="font-size: 1.3rem; color: var(--dorado);">$0</strong>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Lattafa Asad", price: 60000, imgs: ["img/asad.jpg", "img/asad2.jpg", "img/asad3.jpg"] },
        { id: 2, name: "Khamrah", price: 65000, imgs: ["img/khamrah.jpg"] }
    ];

    let cart = [];
    let currentProduct = null;
    let currentImgIdx = 0;
    let currentQty = 1;

    // Iniciar Grid
    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card" onclick="openProduct(${p.id})">
                <img src="${p.imgs[0]}" onerror="this.src='https://via.placeholder.com/300?text=Decantcias'">
                <h3>${p.name}</h3>
                <div class="price">$${p.price.toLocaleString()}</div>
            </div>
        `;
    });

    function openProduct(id) {
        currentProduct = products.find(p => p.id === id);
        currentImgIdx = 0;
        currentQty = 1;
        updateModalUI();
        document.getElementById('productModal').style.display = 'block';
    }

    function updateModalUI() {
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
        document.getElementById('modal-title').innerText = currentProduct.name;
        document.getElementById('modal-price').innerText = `$${currentProduct.price.toLocaleString()}`;
        document.getElementById('prod-qty').innerText = currentQty;
    }

    function updateQty(val) {
        currentQty = Math.max(1, currentQty + val);
        document.getElementById('prod-qty').innerText = currentQty;
    }

    function changeImg(step) {
        currentImgIdx = (currentImgIdx + step + currentProduct.imgs.length) % currentProduct.imgs.length;
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
    }

    function addToCart() {
        cart.push({ ...currentProduct, qty: currentQty, cartId: Date.now() });
        updateGlobalCart();
        closeModals();
    }

    function updateGlobalCart() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('modal-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('cart-count').innerText = cart.length;
        
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.length === 0 ? '<p>No hay productos aún.</p>' : 
            cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.qty}x ${item.name}</strong><br>
                        <small>$${(item.price * item.qty).toLocaleString()}</small>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" style="color:#ff4d4d; background:none; border:none; cursor:pointer; font-size:1.2rem; padding: 5px 10px;">✕</button>
                </div>
            `).join('');
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        updateGlobalCart();
    }

    function openCart() { document.getElementById('cartModal').style.display = 'block'; }
    
    function closeModals() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.getElementById('cartModal').style.display = 'none'; 
    }

    function sendWhatsApp() {
        if(cart.length === 0) return alert("El carrito está vacío.");
        let msg = "✨ *Pedido de Decantcias* ✨\n\n";
        cart.forEach(i => msg += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toLocaleString()})\n`);
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        msg += `\n*Total final: $${total.toLocaleString()}*`;
        window.open(`https://wa.me/5493517883411?text=${encodeURIComponent(msg)}`);
    }

    // Cerrar con click afuera del cuadro blanco
    window.onclick = function(event) {
        if (event.target.className === 'modal') closeModals();
    }
</script>
</body>
</html>

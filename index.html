<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decantcias | Perfumería Árabe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #8a6d3b; --dorado-claro: #bc9c22; --fondo: #fdfaf6; }
        body { font-family: 'Poppins', sans-serif; background: var(--fondo); margin: 0; padding-bottom: 140px; color: #333; }
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Playfair Display', serif; color: var(--dorado); font-size: 2.8rem; margin: 0; letter-spacing: 3px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: contain; border-radius: 15px; }
        .price { font-weight: 600; color: var(--dorado-claro); font-size: 1.2rem; margin-top: 10px; }
        .modal { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 40px 25px 25px; width: 85%; max-width: 450px; border-radius: 25px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; border: none; font-weight: bold; }
        .carousel { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .carousel img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .unidero { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 15px; }
        .btn-qty { background: var(--dorado); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .cart-bar { 
            position: fixed; 
            bottom: 20px; /* Elevado del suelo para que parezca un botón flotante */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--dorado); /* Color dorado para que resalte */
            color: white; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            z-index: 1000; 
            border-radius: 50px; /* Bordes redondeados tipo botón */
            cursor: pointer;
            transition: 0.3s;
        }

        .<div class="cart-bar" onclick="openCart()">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.3rem;">🛒</span>
        <div style="text-align: left;">
            <strong id="cart-count">0</strong> productos<br>
            <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600; opacity: 0.9;">Ver carrito</span>
        </div>
    </div>
    <div style="text-align: right;">
        <small style="opacity: 0.8;">Total:</small><br>
        <strong id="cart-total">$0</strong>
    </div>
</div>
</div>

<script>
    const products = [
        { 
            id: 1, 
            name: "Lattafa Asad", 
            price: 60000, 
            imgs: ["img/asad.jpg", "img/asad2.jpg", "img/asad3.jpg"],
            desc: "Fragancia potente con notas de pimienta negra, piña y vainilla."
        },
        { 
            id: 2, 
            name: "Lattafa Khamrah", 
            price: 65000, 
            imgs: ["img/khamrah.jpg", "img/khamrah2.jpg", "img/khamrah3.jpg"], 
            desc: "Dulce y lujoso con canela, dátiles y praliné."
        },
        { 
            id: 3, 
            name: "Khamrah Qahwa", 
            price: 70000, 
            // CORREGIDO SEGÚN TUS NOMBRES:
            imgs: [
                "img/khamrahqhawa.jpg",  // La 1: khamrah + qhawa
                "img/khamrahqahwa2.jpg", // La 2: khamrah + qahwa
                "img/khamraqahwa3.jpg"   // La 3: khamra (sin h) + qahwa
            ],
            desc: `Khamrah Qahwa de Lattafa (2023) es una fragancia árabe unisex, oriental y especiada, destacada por una nota intensa de café cremoso mezclada con praliné, canela y vainilla. Es una versión más intensa y "gourmand" del Khamrah original, ideal para climas fríos, noches de otoño/invierno, con alta duración (12+ horas) y una estela seductora y cálida.

Características Principales:
• Familia Olfativa: Oriental Especiada Gourmand.
• Notas de Salida: Canela, cardamomo y jengibre.
• Notas de Corazón: Praliné, frutas confitadas y flores blancas.
• Notas de Fondo: Café, vainilla, haba tonka, benjuí y almizcle.

Aroma: Comienza especiado y evoluciona hacia un dulzor cremoso con el café como protagonista, evocando una cafetería de lujo.`
        }
    ];

    let cart = [];
    let currentProduct = null;
    let currentImgIdx = 0;
    let currentQty = 1;

    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card" onclick="openProduct(${p.id})">
                <img src="${p.imgs[0]}" onerror="this.src='https://via.placeholder.com/300?text=Decantcias'">
                <h3>${p.name}</h3>
                <div class="price">$${p.price.toLocaleString()}</div>
            </div>`;
    });

    function openProduct(id) {
        currentProduct = products.find(p => p.id === id);
        currentImgIdx = 0; currentQty = 1;
        document.getElementById('modal-img').src = currentProduct.imgs[0];
        document.getElementById('modal-title').innerText = currentProduct.name;
        document.getElementById('modal-price').innerText = `$${currentProduct.price.toLocaleString()}`;
        document.getElementById('prod-qty').innerText = currentQty;
        document.getElementById('modal-desc').innerText = currentProduct.desc;
        document.getElementById('productModal').style.display = 'block';
    }

    function updateQty(val) { currentQty = Math.max(1, currentQty + val); document.getElementById('prod-qty').innerText = currentQty; }
    
    function changeImg(s) { 
        currentImgIdx = (currentImgIdx + s + currentProduct.imgs.length) % currentProduct.imgs.length;
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx]; 
    }

    function closeModals() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.getElementById('cartModal').style.display = 'none'; 
    }

    function openCart() { document.getElementById('cartModal').style.display = 'block'; updateGlobalCart(); }

    function addToCart() {
        cart.push({ ...currentProduct, qty: currentQty, cartId: Date.now() });
        updateGlobalCart();
        closeModals();
    }

    function updateGlobalCart() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('modal-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.length === 0 ? '<p>Vacío</p>' : cart.map(item => `
            <div class="cart-item">
                <div><strong>${item.qty}x ${item.name}</strong></div>
                <button onclick="event.stopPropagation(); removeFromCart(${item.cartId})" style="color:red; background:none; border:none; cursor:pointer;">✕</button>
            </div>`).join('');
    }

    function removeFromCart(id) { cart = cart.filter(i => i.cartId !== id); updateGlobalCart(); }

    function sendWhatsApp() {
        if(cart.length === 0) return;
        let msg = "✨ *Pedido Decantcias* ✨\n\n";
        cart.forEach(i => msg += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toLocaleString()})\n`);
        msg += `\n*Total: $${cart.reduce((s, i) => s + (i.price * i.qty), 0).toLocaleString()}*`;
        window.open(`https://wa.me/5493517883411?text=${encodeURIComponent(msg)}`);
    }

    window.onclick = (e) => { if (e.target.className === 'modal') closeModals(); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decantcias | Perfumería Árabe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #8a6d3b; --dorado-claro: #bc9c22; --fondo: #fdfaf6; }
        body { font-family: 'Poppins', sans-serif; background: var(--fondo); margin: 0; padding-bottom: 120px; color: #333; }
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Playfair Display', serif; color: var(--dorado); font-size: 2.8rem; margin: 0; letter-spacing: 3px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        /* Tarjetas */
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: contain; border-radius: 15px; }
        .price { font-weight: 600; color: var(--dorado-claro); font-size: 1.2rem; }
        
        /* Modales */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 450px; border-radius: 25px; position: relative; }
        
        /* Unidero y Carrusel */
        .unidero { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 15px; }
        .btn-qty { background: var(--dorado); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .carousel { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .carousel img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.1); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* Lista de Carrito Detallada */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .btn-del { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 0.8rem; }

        /* Barra Inferior */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); border-radius: 25px 25px 0 0; }
        .btn-buy { background: #25D366; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-view-cart { background: var(--dorado); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; }
        
        .close { position: absolute; right: 25px; top: 20px; font-size: 30px; cursor: pointer; color: #ccc; }
    </style>
</head>
<body>

<header>
    <h1>DECANTCIAS</h1>
    <p>Elegancia en cada gota</p>
</header>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <span class="close" onclick="closeModals()">&times;</span>
        <div class="carousel">
            <button class="nav-btn" style="left:0" onclick="changeImg(-1)">&#10094;</button>
            <img id="modal-img" src="">
            <button class="nav-btn" style="right:0" onclick="changeImg(1)">&#10095;</button>
        </div>
        <h2 id="modal-title" style="font-family: 'Playfair Display', serif;"></h2>
        <div id="modal-price" style="font-size: 1.4rem; color: var(--dorado-claro); font-weight: bold;"></div>
        
        <div class="unidero">
            <button class="btn-qty" onclick="updateQty(-1)">-</button>
            <span id="prod-qty" style="font-weight: bold; font-size: 1.2rem;">1</span>
            <button class="btn-qty" onclick="updateQty(1)">+</button>
        </div>

        <p id="modal-desc" style="color:#666; font-size: 0.9rem;"></p>
        <button onclick="addToCart()" class="btn-buy" style="width: 100%; background: var(--dorado);">Añadir al Carrito</button>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModals()">&times;</span>
        <h2 style="font-family: 'Playfair Display', serif;">Mi Carrito</h2>
        <div id="cart-list">
            </div>
        <div style="margin-top: 20px; text-align: right; font-size: 1.2rem;">
            Total: <strong id="modal-total">$0</strong>
        </div>
        <button onclick="sendWhatsApp()" class="btn-buy" style="width: 100%; margin-top: 20px;">Confirmar pedido por WhatsApp</button>
    </div>
</div>

<div class="cart-bar">
    <button class="btn-view-cart" onclick="openCart()">🛒 Ver carrito (<span id="cart-count">0</span>)</button>
    <div style="text-align: right;">
        <span style="font-size: 0.8rem; color: #888;">Total</span><br>
        <strong id="cart-total" style="font-size: 1.2rem;">$0</strong>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Lattafa Asad", price: 60000, imgs: ["img/asad.jpg", "img/asad2.jpg", "img/asad3.jpg"], desc: "Fragancia avainillada con notas picantes de pimienta y piña." },
        { id: 2, name: "Khamrah", price: 65000, imgs: ["img/khamrah.jpg"], desc: "Dulce y lujoso, con notas de canela, dátiles y praliné." }
    ];

    let cart = [];
    let currentProduct = null;
    let currentImgIdx = 0;
    let currentQty = 1;

    // Pintar Grid
    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card" onclick="openProduct(${p.id})">
                <img src="${p.imgs[0]}" onerror="this.src='https://via.placeholder.com/300?text=Ver+Fotos'">
                <h3>${p.name}</h3>
                <div class="price">$${p.price.toLocaleString()}</div>
            </div>
        `;
    });

    function openProduct(id) {
        currentProduct = products.find(p => p.id === id);
        currentImgIdx = 0;
        currentQty = 1;
        updateModalUI();
        document.getElementById('productModal').style.display = 'block';
    }

    function updateQty(val) {
        currentQty = Math.max(1, currentQty + val);
        document.getElementById('prod-qty').innerText = currentQty;
    }

    function updateModalUI() {
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
        document.getElementById('modal-title').innerText = currentProduct.name;
        document.getElementById('modal-price').innerText = `$${currentProduct.price.toLocaleString()}`;
        document.getElementById('modal-desc').innerText = currentProduct.desc;
        document.getElementById('prod-qty').innerText = currentQty;
    }

    function changeImg(step) {
        currentImgIdx = (currentImgIdx + step + currentProduct.imgs.length) % currentProduct.imgs.length;
        document.getElementById('modal-img').src = currentProduct.imgs[currentImgIdx];
    }

    function addToCart() {
        cart.push({ ...currentProduct, qty: currentQty, cartId: Date.now() });
        updateGlobalCart();
        closeModals();
    }

    function updateGlobalCart() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('modal-total').innerText = `$${total.toLocaleString()}`;
        document.getElementById('cart-count').innerText = cart.length;
        
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.length === 0 ? '<p>Tu carrito está vacío</p>' : 
            cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.qty}x ${item.name}</strong><br>
                        <small>$${(item.price * item.qty).toLocaleString()}</small>
                    </div>
                    <button class="btn-del" onclick="removeFromCart(${item.cartId})">Eliminar</button>
                </div>
            `).join('');
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        updateGlobalCart();
    }

    function openCart() { document.getElementById('cartModal').style.display = 'block'; }
    function closeModals() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.getElementById('cartModal').style.display = 'none'; 
    }

    function sendWhatsApp() {
        if(cart.length === 0) return alert("Carrito vacío");
        let msg = "✨ *Pedido Decantcias* ✨\n\n";
        cart.forEach(i => msg += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toLocaleString()})\n`);
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        msg += `\n*Total: $${total.toLocaleString()}*`;
        window.open(`https://wa.me/5493517883411?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>

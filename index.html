<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decantcias | Perfumería Árabe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* BANNER */
.top-banner img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    display: block;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: 20px auto;
    padding: 10px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}
.card {
    background: white;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,.1);
    cursor: pointer;
}
.card img {
    width: 100%;
    height: 200px;
    object-fit: contain;
}
.price {
    color: goldenrod;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="top-banner">
    <img src="img/Banner.png" alt="Decantcias">
</div>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<script>
const products = [
{ id:1, name:"Lattafa Asad", price:60000, imgs:["img/asad.jpg"] },
{ id:2, name:"Lattafa Khamrah", price:65000, imgs:["img/khamrah.jpg"] },
{ id:3, name:"Lattafa Yara", price:55000, imgs:["img/yara.jpg"] }
];

const grid = document.getElementById("main-grid");

products.forEach(p => {
    grid.innerHTML += `
        <div class="card">
            <img src="${p.imgs[0]}">
            <h3>${p.name}</h3>
            <div class="price">$${p.price.toLocaleString()}</div>
        </div>
    `;
});
</script>

</body>
</html>
